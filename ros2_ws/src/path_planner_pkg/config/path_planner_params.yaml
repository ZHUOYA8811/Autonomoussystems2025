/**:
  ros__parameters:
    # ============================================================
    # 地图参数
    # ============================================================
    # 地图分辨率（米/格），地图范围由代码根据分辨率自动计算
    map_resolution: 0.5

    # ============================================================
    # 机器人参数
    # ============================================================
    # 碰撞检测半径（米）
    robot_radius: 0.8

    # 探索模式飞行速度（米/秒）
    max_speed: 2.0

    # 巡航/导航模式速度（米/秒），飞往目标点时使用
    transit_speed: 5.0

    # 到达航点的距离阈值（米）
    waypoint_reach_dist: 2.0

    # 触发重规划的偏差距离（米）
    replan_dist: 5.0

    # 首选探索高度（米）
    explore_height: 5.0

    # ============================================================
    # 探索策略参数（来自 planner_pkg 的 explorer_node）
    # ============================================================
    # 卡住检测：位移阈值（米），在 stall_time_threshold 秒内
    # 若移动距离 < movement_threshold 则认为卡住
    movement_threshold: 3.0

    # 卡住检测：时间窗口（秒）
    stall_time_threshold: 10.0

    # 前沿搜索初始半径（栅格数）
    max_distance: 30

    # 卡住后扩大搜索的最大半径（栅格数）
    max_search_distance: 400

    # 探索定时器频率（Hz）
    exploration_rate: 0.3

    # 是否启用 X 轴深度限制
    enforce_x_limit: false

    # X 轴最深许可坐标（仅 enforce_x_limit=true 时生效）
    x_limit_max: -700.0

    # ============================================================
    # 算法参数
    # ============================================================
    # 使用A*算法（true）或RRT算法（false）
    use_astar: true

    # state_machine中本节点的名称（用于心跳和命令接收）
    node_name_in_sm: "navigator"
